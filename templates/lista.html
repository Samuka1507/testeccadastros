<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Clientes</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        /* Um pouquinho de CSS extra só para a tabela ficar bonita */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th,
        td {
            padding: 10px;
            border-bottom: 1px solid #ddd;
            text-align: left;
        }

        th {
            background-color: #f2f2f2;
        }

        .btn-voltar {
            display: inline-block;
            margin-bottom: 20px;
            text-decoration: none;
            color: #007bff;
        }
    </style>
</head>

<body>
    <div class="container" style="max-width: 600px;">
        <a href="/" class="btn-voltar">← Voltar para o Cadastro</a>
        <h2>Clientes Cadastrados</h2>

        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nome</th>
                    <th>E-mail</th>
                    <th>Telefone</th>
                </tr>
            </thead>
            <tbody>
                {% for cliente in clientes %}
                <tr>
                    <td>{{ cliente['id'] }}</td>
                    <td>{{ cliente['nome'] }}</td>
                    <td>{{ cliente['email'] }}</td>
                    <td>{{ cliente['telefone'] }}</td>
                </tr>
                {% else %}
                <tr>
                    <td colspan="4" style="text-align: center;">Nenhum cliente cadastrado ainda.</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</body>

</html>
